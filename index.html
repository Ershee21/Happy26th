<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy 26th Love ❤️</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>


  <link href="https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@400;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:linear-gradient(135deg,#ff9a9e,#fad0c4);
      min-height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      font-family:"Playpen Sans", cursive;
    }

    .container{
      position:relative;

      width:900px;
      height:800px;

      background:white;

      border-radius:25px;
      box-shadow:0 10px 30px rgba(0,0,0,.2);

      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;

      text-align:center;
    }

    .cat-container{
      display: flex;
      justify-content: center;
      transform: translateY(-50px);
    }

    .cat-gif{
      width:400px;
      height:auto;
    }

    h1{
      font-family: "Playpen Sans", cursive;

      font-size:50px;
      color:#ff4f81;
      font-weight:600;
      margin-bottom:10px;
    }

    h2{
      font-family: "Playpen Sans", cursive;
      font-weight: 200;
      font-style: normal;
      font-size: 30px;      /* Adjust as needed */
      color: #444;
      margin-bottom: 20px;
    }

    .buttons{
      display:flex;
      gap:30px;
    }

    button{
      width:300px;
      height:80px;

      border:none;
      border-radius:50px;

      font-family:"Playpen Sans", cursive;
      font-size:26px;
      font-weight:700;

      cursor:pointer;

      transition:.3s;
    }

    #yesBtn{
      background:#ff4f81;
      color:white;
    }

    #yesBtn:hover{
      transform:scale(1.08);
    }

    #noBtn{
      background:#999;
      color:white;
    }

    #noBtn:hover{
      transform:scale(1.08);
    }

  </style>

</head>

<body>

<div class="container">

  <div class="cat-container">
    <img src="cat.gif" class="cat-gif" alt="Cute Cat">
  </div>

  <h1>🌻 Happy 26th Love 🌻</h1>

  <h2>Do you want to see your gift?</h2>

  <div class="buttons">

    <button id="yesBtn"
            onclick="window.location.href='yes_button.html'">
      YES ❤️
    </button>

    <button id="noBtn"
            onclick="window.location.href='no_button.html'">
      NO 🙈
    </button>

  </div>

</div>

</body>
</html>
