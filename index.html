<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy 26th Love ❤️</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Imperial+Script&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#ff9a9e,#fad0c4);
      overflow:hidden;
    }

    .cat-container{
      display: flex;
      justify-content: center;
      margin-top: -50px; /* Moves the cat upward */
      margin-bottom: 20px;
    }

    .container{
      background: white;
      width: 900px;
      height: 700px;

      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,.2);

      display: flex;
      flex-direction: column;
      justify-content: center;   /* Centers vertically */
      align-items: center;       /* Centers horizontally */

      text-align: center;
      gap: 15px;
    }

    h1{
      font-family: "Playpen Sans", cursive;
      font-weight: 400;
      font-style: normal;
      font-size: 70px;
      color: #ff4f81;
      margin-top: -20px;
    }


    h2{

      font-family: "Playpen Sans", cursive;
      font-weight: 400;
      font-style: italic;
      font-size: 30px;      /* Adjust as needed */
      color: #444;
      margin-bottom: 20px;
    }

    .buttons{
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-top: -20px; /* Negative value moves it up */
    }
    button{
      padding: 18px 40px;   /* Makes the button larger */
      font-size: 24px;
      font-family: "Playpen Sans", cursive;/* Bigger text */
      border: none;
      border-radius: 40px;  /* More rounded corners */
      cursor: pointer;
      transition: .3s;
      width: 300px;
      height: 60px;
    }

    #yesBtn{
      background:#ff4f81;
      color:white;
      margin-right:20px;
    }

    #yesBtn:hover{
      transform:scale(1.08);
    }

    #noBtn{
      background:#999;
      color:white;
      position:relative;
    }

    #noBtn:hover{
      transform:scale(1.08);
    }

    #gift{
      display:none;
      margin-top:30px;
      animation:fade 1s;
    }

    #gift h2{
      color:#ff4f81;
    }

    #gift p{
      margin-top:10px;
      font-size:18px;
      color:#555;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

  </style>
</head>

<body>

<div class="container">

  <div class="cat-container">
    <img src="cat.gif" alt="Cute Cat" class="cat-gif">
  </div>
  <h1> 🌻 Happy 26th Love 🌻</h1>
  <h2>Do you want to see your gift?</h2>

  <div class="buttons">
    <button id="yesBtn" onclick="window.location.href='yes_button.html'">
      YES ❤️
    </button>

    <button id="noBtn" onclick="window.location.href='no_button.html'">
      NO 🙈
    </button>
  </div>

  <div id="gift">
    <h2>🎉 Surprise! 🎉</h2>
    <p>
      This is where your special gift will appear! ❤️<br><br>
      I hope this little surprise makes you smile.
      You deserve all the love and happiness in the world. 🥰
    </p>
  </div>




</div>



</body>
</html>
