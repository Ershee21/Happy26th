<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Gift ❤️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>


  <link href="https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@400;700&display=swap" rel="stylesheet">


  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:linear-gradient(135deg,#ff9a9e,#fad0c4);
      min-height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      font-family:Arial, sans-serif;
    }

    .return-link{
      position: fixed;
      top: 20px;
      left: 30px;

      font-family: "Playpen Sans", cursive;
      font-size: 40px !important;
      font-weight: 700;

      color: white;
      text-decoration: none;

      z-index: 9999;
    }

    .return-link:hover{
      text-decoration: underline;
    }

    .container{
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }


    .container h1{
      text-align:center;

      margin-bottom:40px;

    }

    h1{
      font-family: "Playpen Sans", cursive;
      font-weight: 700;
      font-style: normal;
      font-size: 70px;
      color: #ff4f81;
      margin-top: -20px;
    }

    h2{
      font-family: "Playpen Sans", cursive;
      font-size: 30px;
      color: #2e2e2e;
      font-weight: 100;
      margin-top: -20px;    /* Moves it higher */
      margin-bottom: 30px;

      text-align: center;
    }

    .grid{
      display: grid;
      grid-template-columns: repeat(2, 300px);
      gap: 35px;
    }


    .box img{
      width:100%;
      height:100%;
      object-fit:cover;
      border-radius:20px;
    }

    .gift-box{
      background: white;
      height: 300px;
      width: 300px;
      border-radius: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,.2);

      display: flex;
      justify-content: center;
      align-items: center;

      font-size: 30px;
      color: #ff4f81;

      cursor: pointer;

      transition: transform .3s ease,
      box-shadow .3s ease,
      background .3s ease;


    }

    .gift-box:hover{
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 18px 35px rgba(0,0,0,.3);
      background: #fff7f9;

    }

    .gift-box:active{
      transform: scale(.98);
    }

    .gift-box{
      width:300px;
      height:300px;
      border-radius:20px;
      overflow:hidden;          /* Keeps the image inside the rounded corners */
      box-shadow:0 10px 20px rgba(0,0,0,.2);
      cursor:pointer;
      transition:transform .3s, box-shadow .3s;
    }

    .gift-box img{
      background: white;
      width: 300px;
      height: 300px;

      border: 10px solid  #ff4f81;   /* Pink border */

      border-radius: 20px;
      overflow: hidden;

      box-shadow: 0 10px 20px rgba(0,0,0,.2);

      display: flex;
      justify-content: center;
      align-items: center;

      cursor: pointer;

      transition: transform .3s ease,
      box-shadow .3s ease,
      border-color .3s ease;
    }

    .gift-box:hover{
      transform:translateY(-8px) scale(1.03);
      box-shadow:0 18px 35px rgba(0,0,0,.3);
    }





  </style>
</head>

<body>

<div class="container">

  <h1>THESE ARE FOR YOU!</h1>
  <h2>I hope you like it!</h2>

  <div class="grid">

    <div class="grid">

      <div class="gift-box" onclick="window.location.href='camera.html'">
        <img src="camera.png" alt="Gift 1">
      </div>

      <div class="gift-box" onclick="window.location.href='flowers.html'">
        <img src="flowers.png" alt="Gift 2">
      </div>

      <div class="gift-box" onclick="window.location.href='letter.html'">
        <img src="letter.png" alt="Gift 3">
      </div>

      <div class="gift-box" onclick="window.location.href='music.html'">
        <img src="song.png" alt="Gift 4">
      </div>

    </div>

  </div>

  <a href="index.html" class="return-link">← Return</a>

</div>

</body>
</html>
